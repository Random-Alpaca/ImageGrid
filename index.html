
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Jacky Xue</title>
      <meta name="description" content="Photography by Jacky Xue — an interactive image portfolio." />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
      <script>
        (function () {
          var ua = navigator.userAgent;
          var os;
          if (/iPhone|iPad|iPod|Macintosh/.test(ua) && !(/Windows/.test(ua))) {
            os = "apple";
          } else if (/Android/.test(ua)) {
            os = "android";
          } else if (/Windows/.test(ua)) {
            os = "windows";
          } else if (/Linux/.test(ua)) {
            os = "linux";
          }
          if (os) {
            document.documentElement.setAttribute("data-os", os);
            if (os === "android") {
              var link = document.createElement("link");
              link.rel = "stylesheet";
              link.href = "https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap";
              document.head.appendChild(link);
            }
          }
        })();
      </script>
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
